services:
  catocode:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      # Docker socket — CatoCode manages the worker container
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent database and repo data
      - catocode-data:/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      # GitHub auth — use GITHUB_TOKEN (PAT) or GITHUB_APP_* (GitHub App)
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY}
      - GITHUB_APP_INSTALLATION_ID=${GITHUB_APP_INSTALLATION_ID}
      - GITHUB_APP_WEBHOOK_SECRET=${GITHUB_APP_WEBHOOK_SECRET}
      - GIT_USER_NAME=${GIT_USER_NAME:-CatoCode}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-catocode@bot.local}
      - MAX_CONCURRENT=${MAX_CONCURRENT:-3}
      - CATOCODE_PATROL_MAX_ISSUES=${CATOCODE_PATROL_MAX_ISSUES:-5}
      - CATOCODE_PATROL_WINDOW_HOURS=${CATOCODE_PATROL_WINDOW_HOURS:-12}
      - CATOCODE_MEM=${CATOCODE_MEM:-8g}
      - CATOCODE_CPUS=${CATOCODE_CPUS:-4}

    command: server --port 8000 --max-concurrent ${MAX_CONCURRENT:-3}

volumes:
  catocode-data:
