services:
  catocode:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      # Docker socket — CatoCode manages the worker container
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent database and repo data
      - catocode-data:/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      # GitHub App SaaS credentials
      - GITHUB_APP_ID=${GITHUB_APP_ID:-}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY:-}
      - GITHUB_APP_CLIENT_ID=${GITHUB_APP_CLIENT_ID:-}
      - GITHUB_APP_CLIENT_SECRET=${GITHUB_APP_CLIENT_SECRET:-}
      - GITHUB_APP_NAME=${GITHUB_APP_NAME:-catocode}
      - GITHUB_APP_WEBHOOK_SECRET=${GITHUB_APP_WEBHOOK_SECRET:-}
      - SESSION_SECRET_KEY=${SESSION_SECRET_KEY:-}
      - CATOCODE_BASE_URL=${CATOCODE_BASE_URL:-http://localhost:8000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - GIT_USER_NAME=${GIT_USER_NAME:-CatoCode}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-catocode@bot.local}
      - MAX_CONCURRENT=${MAX_CONCURRENT:-3}
      - CATOCODE_MEM=${CATOCODE_MEM:-8g}
      - CATOCODE_CPUS=${CATOCODE_CPUS:-4}
      # Embedding service (optional, for issue deduplication)
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-}
    command: server --port 8000 --max-concurrent ${MAX_CONCURRENT:-3}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/webhook/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - INTERNAL_API_URL=http://catocode:8000
    depends_on:
      catocode:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  catocode-data:
