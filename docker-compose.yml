services:
  catocode:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      # Docker socket — CatoCode manages the worker container
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent database and repo data
      - catocode-data:/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      # GitHub auth — use GITHUB_TOKEN (PAT) or GITHUB_APP_* (GitHub App)
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_APP_ID=${GITHUB_APP_ID:-}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY:-}
      - GITHUB_APP_INSTALLATION_ID=${GITHUB_APP_INSTALLATION_ID:-}
      - GITHUB_APP_WEBHOOK_SECRET=${GITHUB_APP_WEBHOOK_SECRET:-}
      - GIT_USER_NAME=${GIT_USER_NAME:-CatoCode}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-catocode@bot.local}
      - MAX_CONCURRENT=${MAX_CONCURRENT:-3}
      - CATOCODE_PATROL_MAX_ISSUES=${CATOCODE_PATROL_MAX_ISSUES:-5}
      - CATOCODE_PATROL_WINDOW_HOURS=${CATOCODE_PATROL_WINDOW_HOURS:-12}
      - CATOCODE_MEM=${CATOCODE_MEM:-8g}
      - CATOCODE_CPUS=${CATOCODE_CPUS:-4}
    command: server --port 8000 --max-concurrent ${MAX_CONCURRENT:-3}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/webhook/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - INTERNAL_API_URL=http://catocode:8000
    depends_on:
      catocode:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  catocode-data:
